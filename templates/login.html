<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — CFERL Lab Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; display: flex; align-items: center; }
    .login-card { border: none; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .login-header { background: #0d6efd; color: white; border-radius: 16px 16px 0 0; padding: 2rem 1.5rem; text-align: center; }
    .logo-wrap { display: inline-block; background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.6) 100%); padding: 10px 18px; border-radius: 12px; margin-bottom: 0.75rem; }
    .login-header h1 { font-size: 1.5rem; margin: 0; font-weight: 700; }
    .login-header p { margin: 0.25rem 0 0; opacity: 0.85; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-11 col-sm-8 col-md-6 col-lg-4">
        <div class="card login-card">
          <div class="login-header">
            <div class="logo-wrap"><img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" style="height:48px;"></div>
            
            <h1>CFERL Lab Management</h1>
            <p>Sign in to continue</p>
          </div>
          <div class="card-body p-4">
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% for cat, msg in messages %}
                <div class="alert alert-{{ cat }} alert-dismissible fade show">{{ msg }}
                  <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
              {% endfor %}
            {% endwith %}

            <form method="POST">
              <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
              <div class="mb-3">
                <label for="username" class="form-label"><i class="bi bi-person me-1"></i>Username</label>
                <input type="text" id="username" name="username" class="form-control" required autofocus autocomplete="username">
              </div>
              <div class="mb-4">
                <label for="password" class="form-label"><i class="bi bi-lock me-1"></i>Password</label>
                <input type="password" id="password" name="password" class="form-control" required autocomplete="current-password">
              </div>
              <button class="btn btn-primary w-100 py-2 fw-semibold">
                <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
              </button>
            </form>


          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
