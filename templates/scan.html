{% extends "base.html" %}
{% block title %}Scan QR — Lab Tools{% endblock %}
{% block content %}

<h2 class="mb-3"><i class="bi bi-qr-code-scan me-2"></i>Scan QR Code</h2>
<p class="text-muted">Point your camera at a tool's QR code to view details or check in/out.</p>

<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">
    <div id="reader" class="rounded border overflow-hidden"></div>
    <div id="result" class="mt-3 text-center"></div>
  </div>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
const reader = new Html5Qrcode("reader");
let scanning = false;

function startScan() {
  if (scanning) return;
  scanning = true;

  reader.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 250, height: 250 } },
    onScanSuccess,
    onScanFailure
  ).catch(err => {
    const el = document.getElementById("result");
    el.textContent = "";
    el.className = "mt-3 text-center alert alert-danger";
    el.textContent = `Camera error. Try a different browser or device.`;
    scanning = false;
  });
}

function onScanSuccess(decodedText) {
  reader.stop().then(() => {
    scanning = false;
    const el = document.getElementById("result");
    try {
      const url = new URL(decodedText, window.location.origin);
      if (url.origin !== window.location.origin) {
        el.textContent = "Scanned QR code is not from this app.";
        el.className = "mt-3 text-center alert alert-warning";
        return;
      }
      el.textContent = "Scanned! Redirecting…";
      el.className = "mt-3 text-center alert alert-success";
      window.location.href = url.href;
    } catch {
      el.textContent = "Invalid QR code.";
      el.className = "mt-3 text-center alert alert-warning";
    }
  }).catch(() => {});
}

function onScanFailure(err) {
  // ignore — continuous scanning
}

startScan();
</script>

{% endblock %}
