{% extends "base.html" %}
{% block title %}{{ 'Edit' if category else 'Add' }} Category — Lab Tools{% endblock %}
{% block content %}

<h2 class="mb-4">
  <i class="bi bi-tag me-2"></i>{{ 'Edit' if category else 'Add' }} Category
</h2>

<form method="POST" class="row g-3">
  <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
  <div class="col-md-6">
    <label class="form-label">Name <span class="text-danger">*</span></label>
    <input type="text" name="name" class="form-control" required value="{{ category.name if category else '' }}">
  </div>
  <div class="col-12">
    <label class="form-label">Description</label>
    <textarea name="description" class="form-control" rows="2">{{ category.description if category else '' }}</textarea>
  </div>
  <div class="col-12">
    <button type="submit" class="btn btn-primary">
      <i class="bi bi-check-lg me-1"></i>{{ 'Update' if category else 'Create' }} Category
    </button>
    <a href="{{ url_for('category_list') }}" class="btn btn-outline-secondary ms-2">Cancel</a>
  </div>
</form>

{% endblock %}
